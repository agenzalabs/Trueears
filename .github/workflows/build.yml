name: Cross-Platform Build

on:
  push:
    branches: [main, feature/os-agnostic]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scribe-${{ matrix.os }}
          path: |
            backend/target/release/bundle/**/*.exe
            backend/target/release/bundle/**/*.msi
            backend/target/release/bundle/**/*.dmg
            backend/target/release/bundle/**/*.app
            backend/target/release/bundle/**/*.deb
            backend/target/release/bundle/**/*.AppImage
          if-no-files-found: ignore
